<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    id="body"
    class="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-400 to-sky-600 transition-all duration-700"
  >
    <div
      class="bg-white/20 backdrop-blur-xl shadow-2xl rounded-3xl p-8 w-full mx-96 text-center text-white border border-white/20"
    >
      <h1 class="text-3xl font-bold mb-6">🌤 Weather Application</h1>

      <form id="weatherForm" class="flex gap-2 mb-6">
        <input
          id="location"
          type="text"
          placeholder="Enter city"
          class="flex-1 px-4 py-2 rounded-lg text-black outline-none"
        />

        <button
          type="submit"
          class="bg-white text-blue-600 px-4 py-2 rounded-lg font-semibold hover:bg-gray-200"
        >
          Search
        </button>
      </form>

      <button
        id="detect"
        class="mb-4 bg-white/30 px-4 py-2 rounded-lg hover:bg-white/50"
      >
        📍 Detect My Location
      </button>

      <div id="loading" class="hidden">
        <div
          class="animate-spin rounded-full h-10 w-10 border-b-2 border-white mx-auto"
        ></div>
      </div>

      <div id="weatherResult" class="space-y-3 hidden">
        <h2 id="city" class="text-2xl font-bold"></h2>

        <img id="icon" class="w-24 mx-auto" alt="" />

        <p id="temp" class="text-4xl font-bold"></p>

        <p id="condition" class="text-lg"></p>
      </div>

      <p id="error" class="text-red-200 mt-3 hidden"></p>
    </div>
    <script src="app.js"></script>
  </body>
</html>
